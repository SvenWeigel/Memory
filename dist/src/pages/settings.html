<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link
      rel="shortcut icon"
      href="/assets/chess_pawn-DgGs6RCO.png"
      type="image/x-icon"
    />

    <script type="module" crossorigin src="/assets/settings-BWyNOShk.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/style-DHRrug2U.js">
    <link rel="stylesheet" crossorigin href="/assets/style-CCTneqRw.css">
  </head>
  <body>
    <main class="settings-screen">
      <div class="settings-screen__title-wrap">
        <h1 class="settings-screen__title">Settings</h1>
        <div class="settings-screen__underline" aria-hidden="true"></div>
      </div>
      <div class="settings-screen__content">
        <div class="settings-screen__left">
          <div class="setting__game-themes">
            <span class="setting__title"
              ><img src="/assets/palette.png" alt="" /> Game themes</span
            >
            <div class="setting__options">
              <ul class="setting__options__list">
                <li>
                  <input type="checkbox" id="code-vibes" name="code-vibes" />
                  Code vibes theme
                </li>
                <li>
                  <input
                    type="checkbox"
                    id="fruits"
                    name="fruits"
                    value="Fruits"
                  />
                  Food theme
                </li>
              </ul>
            </div>
          </div>
          <div class="setting__choose-player">
            <span class="setting__title">
              <img src="/assets/chess_pawn.png" alt="" /> Choose player</span
            >
            <div class="setting__options">
              <ul class="setting__options__list">
                <li>
                  <input type="checkbox" id="player1" name="player1" />
                  Blue
                </li>
                <li>
                  <input type="checkbox" id="player2" name="player2" /> Orange
                </li>
              </ul>
            </div>
          </div>
          <div class="setting__board-size">
            <span class="setting__title">
              <img src="/assets/style.png" alt="" /> Board size</span
            >
            <div class="setting__options">
              <ul class="setting__options__list">
                <li>
                  <input type="checkbox" id="board-4x4" name="board-4x4" />16
                  Cards
                </li>
                <li>
                  <input type="checkbox" id="board-6x6" name="board-6x6" /> 24
                  Cards
                </li>
                <li>
                  <input
                    type="checkbox"
                    id="board-6x6-extended"
                    name="board-6x6-extended"
                  />
                  36 Cards
                </li>
              </ul>
            </div>
          </div>
        </div>
        <div class="settings-screen__right">
          <div class="pre-view-game">
            <img src="/assets/preview-code.png" alt="Preview" />
          </div>

          <div class="choose-bar">
            <div class="choose-bar__item">
              <span class="choose-bar__theme">Code Theme</span>
              <div class="__separator"></div>
            </div>
            <div class="choose-bar__item">
              <span class="choose-bar__player">Player</span>
              <div class="__separator"></div>
            </div>
            <div class="choose-bar__item">
              <span class="choose-bar__size">Cards</span>
            </div>
            <div class="choose-bar__item">
              <button class="start-btn" id="start-btn" type="button" disabled>
                <img
                  class="choose-bar__btn__icon"
                  src="/assets/smart_display.png"
                  alt=""
                />Start
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
