<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link
      rel="shortcut icon"
      href="/public/assets/chess_pawn.png"
      type="image/x-icon"
    />

    <link rel="stylesheet" href="../styles/style.scss" />
    <script type="module" src="../scripts/settings.ts"></script>
  </head>
  <body>
    <main class="settings-screen">
      <div class="settings-screen__title-wrap">
        <h1 class="settings-screen__title">Settings</h1>
        <div class="settings-screen__underline" aria-hidden="true"></div>
      </div>
      <div class="settings-screen__content">
        <div class="settings-screen__left">
          <div class="setting__game-themes">
            <span class="setting__title"
              ><img src="/assets/palette.svg" alt="" /> Game themes</span
            >
            <div class="setting__options">
              <ul class="setting__options__list">
                <li>
                  <label for="code-vibes">
                    <input type="radio" id="code-vibes" name="theme" />
                    <span>Code vibes theme</span>
                  </label>
                </li>
                <li>
                  <label for="fruits">
                    <input
                      type="radio"
                      id="fruits"
                      name="theme"
                      value="Fruits"
                    />
                    <span>Food theme</span>
                  </label>
                </li>
              </ul>
            </div>
          </div>
          <div class="setting__choose-player">
            <span class="setting__title">
              <img src="/assets/chess_pawn.svg" alt="" /> Choose player</span
            >
            <div class="setting__options">
              <ul class="setting__options__list">
                <li>
                  <label for="player1">
                    <input type="radio" id="player1" name="player" />
                    <span>Blue</span>
                  </label>
                </li>
                <li>
                  <label for="player2">
                    <input type="radio" id="player2" name="player" />
                    <span>Orange</span>
                  </label>
                </li>
              </ul>
            </div>
          </div>
          <div class="setting__board-size">
            <span class="setting__title">
              <img src="/assets/style.svg" alt="" /> Board size</span
            >
            <div class="setting__options">
              <ul class="setting__options__list">
                <li>
                  <label for="board-4x4">
                    <input type="radio" id="board-4x4" name="board-size" />
                    <span>16 Cards</span>
                  </label>
                </li>
                <li>
                  <label for="board-6x6">
                    <input type="radio" id="board-6x6" name="board-size" />
                    <span>24 Cards</span>
                  </label>
                </li>
                <li>
                  <label for="board-6x6-extended">
                    <input
                      type="radio"
                      id="board-6x6-extended"
                      name="board-size"
                    />
                    <span>36 Cards</span>
                  </label>
                </li>
              </ul>
            </div>
          </div>
        </div>
        <div class="settings-screen__right">
          <div class="pre-view-game">
            <img src="/assets/preview-code.png" alt="Preview" />
          </div>

          <div class="choose-bar">
            <div class="choose-bar__item">
              <span class="choose-bar__theme">Code Theme</span>
              <div class="__separator"></div>
            </div>
            <div class="choose-bar__item">
              <span class="choose-bar__player">Player</span>
              <div class="__separator"></div>
            </div>
            <div class="choose-bar__item">
              <span class="choose-bar__size">Cards</span>
            </div>
            <div class="choose-bar__item">
              <button class="start-btn" id="start-btn" type="button" disabled>
                <img
                  class="choose-bar__btn__icon"
                  src="/assets/smart_display.svg"
                  alt=""
                />Start
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
